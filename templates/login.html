<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <title>RoadCare Login</title>

    <style>

        body{
            margin:0;
            padding:0;

            font-family: Arial, sans-serif;

            background:
            url("{{ url_for('static', filename='images/background.jpg') }}");

            background-size: cover;
            background-position: center;

            height:100vh;

            display:flex;
            justify-content:center;
            align-items:center;
        }

        .login-box{

            width:350px;

            background: rgba(0,0,0,0.55);

            backdrop-filter: blur(10px);

            padding:30px;

            border-radius:20px;

            color:white;

            text-align:center;

            box-shadow:0 0 20px rgba(0,0,0,0.5);
        }

        h1{
            margin-bottom:10px;
        }

        p{
            font-size:14px;
            color:#ddd;
        }

        input{

            width:90%;

            padding:12px;

            margin-top:12px;

            border:none;

            border-radius:10px;

            outline:none;
        }

        button{

            width:95%;

            padding:12px;

            margin-top:15px;

            border:none;

            border-radius:10px;

            background:#008cff;

            color:white;

            cursor:pointer;

            font-weight:bold;
        }

        button:hover{
            background:#0066cc;
        }

        .flash{
            color:yellow;
            margin-top:10px;
        }

    </style>

</head>

<body>

    <div class="login-box">

        <h1>RoadCare</h1>

        <p>
            Platform pelaporan jalan rusak berbasis web
            yang membantu masyarakat mengirim laporan
            secara cepat dan terstruktur.
        </p>

        {% with messages = get_flashed_messages() %}
            {% if messages %}

                {% for msg in messages %}

                    <div class="flash">
                        {{ msg }}
                    </div>

                {% endfor %}

            {% endif %}
        {% endwith %}

        <form method="POST">

            <input
                type="text"
                name="username"
                placeholder="Username"
                required
            >

            <input
                type="password"
                name="password"
                placeholder="Password"
                required
            >

            <button type="submit">
                Login
            </button>

        </form>

    </div>

</body>
</html>
